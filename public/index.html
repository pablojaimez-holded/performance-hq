<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#4361EE" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="description" content="Performance HQ - Gestión de campañas y productividad" />
  <title>Performance HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F8F9FB;
      color: #1A1D26;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      height: 100vh;
    }
    #root { height: 100vh; }
    input:focus, textarea:focus, select:focus {
      border-color: #4361EE !important;
      box-shadow: 0 0 0 3px rgba(67,97,238,.1) !important;
      outline: none;
    }
    ::placeholder { color: #9CA3B4; }
    textarea { resize: vertical; font-family: inherit; }
    button { cursor: pointer; font-family: inherit; }
    a { color: #4361EE; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3B4; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
